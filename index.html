<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>FoxSpace</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>
<body>

  <header>
    <h1>🦊 FoxSpace</h1>
  </header>

  <main>

    <section class="user-box">

      <input
        type="text"
        id="username"
        placeholder="Escolha seu nome"
      >

      <button id="saveUser">
        Salvar Nome
      </button>

    </section>

    <section class="create-post">

      <textarea
        id="postText"
        placeholder="O que está acontecendo?"
      ></textarea>

      <button id="postButton">
        Postar
      </button>

    </section>

    <section id="feed"></section>

  </main>

  <script src="app.js"></script>

</body>
</html>
